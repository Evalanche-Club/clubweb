<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Apply theme immediately to prevent flash
    (function(){
      var t = localStorage.getItem('evalanche-theme');
      if(t) document.documentElement.setAttribute('data-theme', t);
      else  document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying your account — Evalanche Club</title>
  <meta name="description" content="Verify your Evalanche Club account email address.">
  <meta property="og:title" content="Verify Email — Evalanche Club">
  <meta property="og:description" content="Verify your Evalanche Club account email address.">
  <meta property="og:image" content="assets/images/logo.png">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#4df0ff">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .verify-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: rgba(13,17,23,0.95);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3rem 2.5rem;
      text-align: center;
      backdrop-filter: blur(30px);
    }

    .verify-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      font-size: 1.8rem;
      transition: all 0.4s;
    }

    .verify-icon.loading {
      background: rgba(77,240,255,0.08);
      border: 2px solid rgba(77,240,255,0.2);
      color: var(--accent);
    }

    .verify-icon.success {
      background: rgba(77,255,145,0.1);
      border: 2px solid rgba(77,255,145,0.35);
      color: #4dff91;
      animation: popIn 0.4s ease;
    }

    .verify-icon.error {
      background: rgba(255,77,109,0.1);
      border: 2px solid rgba(255,77,109,0.35);
      color: #ff4d6d;
    }

    .verify-icon.recovery {
      background: rgba(255,200,77,0.1);
      border: 2px solid rgba(255,200,77,0.35);
      color: #ffc84d;
    }

    @keyframes popIn {
      0%   { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .verify-card h1 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.6rem;
    }

    .verify-card p {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .verify-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .verify-btn:hover { box-shadow: 0 0 20px rgba(77,240,255,0.35); }

    .verify-btn-ghost {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .verify-btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

    /* Password reset form */
    .reset-form { display: none; text-align: left; margin-top: 1.5rem; }

    .rf-group { margin-bottom: 1rem; }
    .rf-group label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .rf-group input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.8rem 1rem;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .rf-group input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

  <!-- FLOATING THEME TOGGLE -->
  <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme"
    style="position:fixed;top:1.1rem;right:1.25rem;z-index:2000">
    <i class="fas fa-moon" id="themeIcon"></i>
  </button>
  <canvas id="particleCanvas"></canvas>

  <div class="verify-card">
    <!-- Icon changes based on state -->
    <div class="verify-icon loading" id="verifyIcon">
      <i class="fas fa-circle-notch spin" id="verifyIconInner"></i>
    </div>

    <h1 id="verifyTitle">Verifying…</h1>
    <p id="verifyMsg">Please wait while we confirm your account.</p>

    <!-- Password reset form (shown only for recovery links) -->
    <div class="reset-form" id="resetForm">
      <div class="rf-group">
        <label>New Password</label>
        <input type="password" id="newPw" placeholder="At least 8 characters">
      </div>
      <div class="rf-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPw" placeholder="Repeat your password">
      </div>
      <div id="resetError" style="display:none;font-size:0.78rem;color:#ff4d6d;margin-bottom:0.75rem;"></div>
      <button class="verify-btn" style="width:100%;display:block;text-align:center;" onclick="submitNewPassword()">
        Set New Password →
      </button>
    </div>

    <div id="verifyActions"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="main.js"></script>
  <script>
  'use strict';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  const icon    = document.getElementById('verifyIcon');
  const iconEl  = document.getElementById('verifyIconInner');
  const title   = document.getElementById('verifyTitle');
  const msg     = document.getElementById('verifyMsg');
  const actions = document.getElementById('verifyActions');

  function setSuccess(t, m, btnLabel, btnHref) {
    icon.className   = 'verify-icon success';
    iconEl.className = 'fas fa-check';
    title.textContent = t;
    msg.textContent   = m;
    actions.innerHTML = `<a href="${btnHref}" class="verify-btn">${btnLabel}</a>`;
  }

  function setError(t, m) {
    icon.className   = 'verify-icon error';
    iconEl.className = 'fas fa-times';
    title.textContent = t;
    msg.textContent   = m;
    actions.innerHTML = `
      <a href="signup.html" class="verify-btn">Sign Up Again</a><br>
      <a href="login.html" class="verify-btn-ghost" style="margin-top:0.75rem">Go to Login</a>
    `;
  }

  function setRecovery() {
    icon.className    = 'verify-icon recovery';
    iconEl.className  = 'fas fa-key';
    title.textContent = 'Reset your password';
    msg.textContent   = 'Enter a new password for your account.';
    document.getElementById('resetForm').style.display = 'block';
  }

  // ── Insert the member profile row now that the user is authenticated ───────
  async function insertMemberRow(user) {
    // Check if row already exists (in case they clicked link twice)
    const { data: existing } = await db
      .from('members')
      .select('id')
      .eq('email', user.email)
      .maybeSingle();

    if (existing) return; // already inserted, nothing to do

    // Try to get profile data saved by signup.html
    let profile = {};
    try {
      const stored = localStorage.getItem('evalanche_pending_profile');
      if (stored) profile = JSON.parse(stored);
    } catch(e) {}

    // Fall back to auth metadata if localStorage is empty
    const meta = user.user_metadata || {};

    const { error } = await db.from('members').insert({
      first_name:   profile.firstName  || meta.first_name  || '',
      last_name:    profile.lastName   || meta.last_name   || '',
      email:        user.email,
      phone:        profile.phone      || '',
      virtual_id:   profile.virtualId  || meta.virtual_id  || user.email.split('@')[0].toUpperCase(),
      year:         profile.year       || '',
      section:      profile.section    || '',
      interest:     profile.interest   || '',
      role:         'member',
      status:       'pending',
      joined_batch: new Date().getFullYear().toString(),
    });

    if (!error) {
      // Clean up localStorage now that it's written to DB
      try { localStorage.removeItem('evalanche_pending_profile'); } catch(e) {}
    } else {
      console.error('Member row insert error:', error.message);
    }
  }

  async function submitNewPassword() {
    const pw  = document.getElementById('newPw').value;
    const cpw = document.getElementById('confirmPw').value;
    const err = document.getElementById('resetError');
    err.style.display = 'none';

    if (pw.length < 8) {
      err.textContent = 'Password must be at least 8 characters.';
      err.style.display = 'block'; return;
    }
    if (pw !== cpw) {
      err.textContent = 'Passwords do not match.';
      err.style.display = 'block'; return;
    }

    const { error } = await db.auth.updateUser({ password: pw });
    if (error) {
      err.textContent = error.message;
      err.style.display = 'block'; return;
    }

    document.getElementById('resetForm').style.display = 'none';
    setSuccess('Password updated!', 'Your password has been changed. You can now sign in.', 'Go to Login →', 'login.html');
  }

  // ── Main: handle the redirect ─────────────────────────────────────────────
  (async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const type      = urlParams.get('type');

    // If it's a password reset link, show recovery form immediately
    if (type === 'recovery') {
      // Wait briefly for Supabase to process the hash tokens
      setTimeout(() => setRecovery(), 500);
    }

    // Listen for auth state changes triggered by the link tokens in the URL hash
    db.auth.onAuthStateChange(async (event, session) => {

      if (event === 'PASSWORD_RECOVERY') {
        setRecovery();
        return;
      }

      if (event === 'SIGNED_IN' && session?.user) {
        const user = session.user;

        // If it's a recovery redirect, show the password form
        if (type === 'recovery') {
          setRecovery();
          return;
        }

        // Email confirmation flow
        if (user.email_confirmed_at) {
          // Now authenticated — safe to insert member row
          await insertMemberRow(user);

          setSuccess(
            'Email verified!',
            'Your email is confirmed. Your application is now pending admin approval — you\'ll be able to log in once approved.',
            'Go to Login →',
            'login.html'
          );
        }
      }
    });

    // Fallback: check if session already exists (user refreshed verify page)
    const { data: { session } } = await db.auth.getSession();
    if (session?.user?.email_confirmed_at && type !== 'recovery') {
      await insertMemberRow(session.user);
      setSuccess(
        'Email already verified!',
        'Your email is confirmed and your application is pending admin approval.',
        'Go to Login →',
        'login.html'
      );
    } else if (!session && type !== 'recovery') {
      // No session and no recovery — wait 4s for hash processing, then show error
      setTimeout(async () => {
        const { data: { session: s2 } } = await db.auth.getSession();
        if (!s2) {
          setError(
            'Link expired or invalid',
            'This link has expired or already been used. Please sign up again or request a new verification email.'
          );
        }
      }, 4000);
    }
  })();
  </script>
</body>
</html>
